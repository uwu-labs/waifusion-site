name: Build application on PR
"on":
  pull_request:
    branches:
      - v1
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Installing Dependencies
        run: npm ci
      - name: Building
        run: npm run build
        env:
          CI: true
      - name: Verify build output
        run: test -f dist/index.html && test -d dist/assets
