name: Deploy to Firebase Hosting on merge
"on":
  push:
    branches:
      - v1
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Installing Dependencies
        run: npm ci
      - name: Building
        run: npm run build
        env:
          CI: true
      - name: Verify build output
        run: test -f dist/index.html && test -d dist/assets
      - name: Install Firebase Tools
        run: npm install -g firebase-tools
      - name: Deploying to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Missing GitHub secret FIREBASE_SERVICE_ACCOUNT (full service account JSON). See Firebase console → Project settings → Service accounts."
            exit 1
          fi
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          chmod 600 "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          firebase deploy --only hosting --non-interactive
